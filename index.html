<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlaTch</title>

<style>
body {
    margin: 0;
    background: black;
    color: #00ff66;
    font-family: monospace;
    overflow: hidden;
}

/* 共通画面 */
.screen {
    position: absolute;
    width: 100%;
    height: 100%;
    display: none;
    justify-content: center;
    align-items: center;
}

/* ブート画面 */
#boot {
    display: flex;
    font-size: 20px;
}

/* ロゴ画面 */
#logo {
    display: flex;
    opacity: 0;
    transition: opacity 1s;
}

#logo img {
    width: 200px;
}

/* ホーム画面 */
#home {
    flex-direction: column;
    background: black;
}

/* 上部バー */
.top-bar {
    width: 100%;
    background: #00ff66;
    color: black;
    text-align: center;
    padding: 10px 0;
    font-weight: bold;
}

/* コンテンツ */
.content {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    color: gray;
}
</style>
</head>

<body>

<!-- ブート画面 -->
<div id="boot" class="screen">
    <div id="bootText">Booting Game System...</div>
</div>

<!-- ロゴ画面 -->
<div id="logo" class="screen">
    <img src="Logo.png" alt="Logo">
</div>

<!-- ホーム画面 -->
<div id="home" class="screen">
    <div class="top-bar">ゲーム一覧</div>
    <div class="content">
        まだゲームはないぜ！
    </div>
</div>

<script>

// 画面切り替え関数
function showScreen(id) {
    document.querySelectorAll(".screen").forEach(s => s.style.display = "none");
    document.getElementById(id).style.display = "flex";
}

// 起動処理
window.onload = () => {

    // ① ブート表示
    showScreen("boot");

    setTimeout(() => {

        // ② ロゴ表示
        showScreen("logo");

        const logo = document.getElementById("logo");
        logo.style.opacity = 0;

        setTimeout(() => {
            logo.style.opacity = 1;
        }, 100);

        // フェードアウト
        setTimeout(() => {
            logo.style.opacity = 0;
        }, 2000);

        // ③ ホームへ
        setTimeout(() => {
            showScreen("home");
        }, 3000);

    }, 1500);
};

</script>

</body>
</html>
