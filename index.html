<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlaTch</title>

<style>
body {
    margin: 0;
    background: black;
    color: #00ff66;
    font-family: monospace;
    overflow: hidden;
}

.screen {
    position: absolute;
    width: 100%;
    height: 100%;
    display: none;
    justify-content: center;
    align-items: center;
}

/* ブート */
#boot { display: flex; }

/* ロゴ */
#logo {
    display: flex;
    opacity: 0;
    transition: opacity 1s;
}

/* ホーム */
#home {
    flex-direction: column;
}

/* 上部バー */
.top-bar {
    width: 100%;
    background: #00ff66;
    color: black;
    text-align: center;
    padding: 10px 0;
    font-weight: bold;
    position: relative;
}

/* ⚙ボタン */
.settings-btn {
    position: absolute;
    right: 10px;
    top: 5px;
    font-size: 20px;
    cursor: pointer;
}

/* コンテンツ */
.content {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    color: gray;
}

/* 設定画面 */
#settings {
    flex-direction: column;
}

/* ボタン */
.menu-btn {
    padding: 10px 20px;
    border: 1px solid #00ff66;
    margin: 10px;
    cursor: pointer;
}

/* About画面 */
#about {
    flex-direction: column;
    text-align: center;
}
</style>
</head>

<body>

<!-- ブート -->
    <div id="boot" class="screen" onclick="startSystem()">
    タップして起動
</div>

<!-- ロゴ -->
<div id="logo" class="screen">
    <img src="Logo.png" width="200">
</div>

<!-- ホーム -->
<div id="home" class="screen">
    <div class="top-bar">
        ゲーム一覧
        <div class="settings-btn" onclick="showScreen('settings')">⚙</div>
    </div>
    <div class="content">
        まだゲームはないぜ！音かっこいいやろ
    </div>
</div>

<!-- 設定 -->
<div id="settings" class="screen">
    <div class="menu-btn" onclick="showScreen('about')">About</div>
    <div class="menu-btn" onclick="showScreen('home')">戻る</div>
</div>

<!-- About -->
<div id="about" class="screen">
    <h2>Console Info</h2>
    <p>スマホで遊べるゲーム機</p>
    <p>Version: β</p>
    <p>Created by 中学のメンツ</p>

    <div class="menu-btn" onclick="showScreen('settings')">戻る</div>
</div>

<script>

function showScreen(id) {
    document.querySelectorAll(".screen").forEach(s => s.style.display = "none");
    document.getElementById(id).style.display = "flex";
}

// 最初はブート画面だけ表示
window.onload = () => {
    showScreen("boot");
};

// タップされたら起動
function startSystem() {

    setTimeout(() => {

        showScreen("logo");

        const sound = document.getElementById("bootSound");
        sound.currentTime = 0;
        sound.play().catch(() => {
            console.log("音再生ブロックされた");
        });

        const logo = document.getElementById("logo");

        setTimeout(() => {
            logo.style.opacity = 1;
        }, 100);

        setTimeout(() => {
            logo.style.opacity = 0;
        }, 2000);

        setTimeout(() => {
            showScreen("home");
        }, 3000);

    }, 300);
}
</script>
    
    <audio id="bootSound" src="Sound.mp3"></audio>
    
</body>
</html>
