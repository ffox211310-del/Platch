<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlaTch</title>

<style>
body {
    margin: 0;
    background: black;
    color: #00ff66;
    font-family: monospace;
    overflow: hidden;
}

.screen {
    position: absolute;
    width: 100%;
    height: 100%;
    display: none;
    justify-content: center;
    align-items: center;
}

/* ブート */
#boot { display: flex; }

/* ロゴ */
#logo {
    display: flex;
    opacity: 0;
    transition: opacity 1s;
}

/* ホーム */
#home {
    flex-direction: column;
}

/* 上部バー */
.top-bar {
    width: 100%;
    background: #00ff66;
    color: black;
    text-align: center;
    padding: 10px 0;
    font-weight: bold;
    position: relative;
}

   
    
/* ⚙ボタン */
.settings-btn {
    position: absolute;
    right: 10px;
    top: 5px;
    font-size: 20px;
    cursor: pointer;
}

/* コンテンツ */
.content {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    color: gray;
}

/* 設定画面 */
#settings {
    flex-direction: column;
}

/* ボタン */
.menu-btn {
    padding: 10px 20px;
    border: 1px solid #00ff66;
    margin: 10px;
    cursor: pointer;
}

    #news {
    flex-direction: column;
    text-align: center;
    color: #00ff66;
}
/* About画面 */
#about {
    flex-direction: column;
    text-align: center;
}
</style>
</head>

<body>


<!-- ブート -->
<div id="boot" class="screen" onclick="startSystem()">
    Please Touch Screen...
</div>

<!-- ロゴ -->
<div id="logo" class="screen">
    <img src="Logo.png" width="200">
</div>

<!-- ホーム -->
<div id="home" class="screen">

    <div class="top-bar">

      <div id="clock" style="
    position: absolute;
    top: 10px;
    left: 10px;
    font-size: 14px;
">
    00:00
</div>
        
        ゲーム一覧
        <div class="settings-btn" onclick="showScreen('settings')">⚙</div>
    </div>

    <div class="content">
        <div onclick="openGame('janken')" style="
            position: absolute;
            top: 70px;
            left: 10px;
            text-align: center;
            cursor: pointer;
            color:#ffffff;
        ">
            <img src="Icon.png" width="30"><br>
            じゃいけん
        </div>
    </div>


    <div onclick="openGame('catchGame')" style="
    position: absolute;
    top: 135px;
    left: 19px;
    text-align: center;
    cursor: pointer;
    color:#ffffff;
">
    <img src="catchIconNEW.png" width="30"><br>
    キャッチ
</div>

    <div onclick="openGame('moguraGame')" style="
    position: absolute;
    top: 205px;
    left: 12px;
    text-align: center;
    cursor: pointer;
    color:#ffffff;
">
    <img src="Mogura.png" width="43"><br>
    シトム叩き
</div>
    
</div> <!-- ←★homeここで閉じる！！ -->

<!-- 設定 -->
<div id="settings" class="screen">
   <div class="menu-btn" onclick="showScreen('about')">About</div>
   <div class="menu-btn" onclick="showScreen('news')">NEWS</div>
    <div class="menu-btn" onclick="showScreen('home')">戻る</div>
</div>

<!-- About -->
<div id="about" class="screen">
    <h2>PlaTchとは</h2>
    <p>スマホで遊べるゲーム機です。</p>
    <p>ミニゲームを量産します</p>
    <p>Version: β</p>
    <p>Created by 中学のメンツ</p>

    <div class="menu-btn" onclick="showScreen('settings')">戻る</div>
</div>

    <!-- NEWS -->
<div id="news" class="screen">
    <h2>最新情報</h2>
    <p>2026年４月1日</p>
    <p>『キャッチ』を追加</p>
    <p>3月31日</p>
    <p>『じゃいけん』を追加</p>
    <p>3月30日</p>
    <p>PlaTch制作開始</p>

    <div class="menu-btn" onclick="showScreen('settings')">戻る</div>
</div>
    
<!-- じゃんけん -->
<div id="janken" class="screen" style="flex-direction: column;">

    <div style="position:absolute; top:10px; left:10px;">
        シトム: <span id="enemyScore">0</span>
    </div>

    <div style="position:absolute; top:10px; right:10px;">
        プレイヤー: <span id="playerScore">0</span>
    </div>

    <div id="jankenText" style="color:#00ff66; margin-top:50px;">
        シトムとじゃんけんしてみよう
    </div>

    <img src="SITM.png" width="200" style="margin:20px;">

  <div id="jankenButtons">
    <button onclick="playJanken('グー')">✊</button>
    <button onclick="playJanken('チョキ')">✌️</button>
    <button onclick="playJanken('パー')">✋</button>
</div>

</div>
    
    <div id="catchGame" class="screen" style="flex-direction: column; overflow:hidden;">

    <!-- タイマー -->
    <div style="position:absolute; top:10px; left:10px;">
        ⏱ <span id="time">25</span>
    </div>

    <!-- スコア -->
    <div style="position:absolute; top:10px; right:10px;">
        ⭐ <span id="score">0</span>
    </div>

    <!-- 落下物 -->
    <div id="fallArea"></div>

    <!-- シトム -->
    <img id="player" src="catch.png" width="80" style="
        position:absolute;
        bottom:10px;
        left:50%;
        transform:translateX(-50%);
    ">

</div>

    <div id="moguraGame" class="screen" style="flex-direction: column;">

    <!-- タイマー -->
    <div style="position:absolute; top:10px; left:10px;">
        ⏱ <span id="moguraTime">20</span>
    </div>

    <!-- スコア -->
    <div style="position:absolute; top:10px; right:10px;">
        ⭐ <span id="moguraScore">0</span>
    </div>

</div>
    
  <div id="catchResult" class="screen" style="
    display:none;
    flex-direction:column;
    align-items:center;
">
    <div id="resultText" style="font-size:30px;"></div>

    <button type="button" onclick="restartCatch()">再挑戦</button>
    <button type="button" onclick="goHome()">ホームへ</button>
</div>

    <div id="moguraResult" class="screen" style="flex-direction:column;">
    <div id="moguraResultText" style="font-size:30px;"></div>

    <button onclick="restartMogura()">再挑戦</button>
    <button onclick="goHome()">ホームへ</button>
</div>
    
<!-- JSまとめ -->
<script>

    function updateClock() {
    const now = new Date();

    let h = now.getHours().toString().padStart(2, '0');
    let m = now.getMinutes().toString().padStart(2, '0');

    document.getElementById("clock").textContent = `${h}:${m}`;
}

// 1秒ごと更新
setInterval(updateClock, 1000);

// 初回実行
updateClock();
    
function showScreen(id) {
    document.querySelectorAll(".screen").forEach(s => s.style.display = "none");
    document.getElementById(id).style.display = "flex";
}



window.onload = () => {
    showScreen("boot");
};

  function openGame(id){
    showScreen(id);

    if(id === "catchGame"){
        startCatchGame();
    }
      if(id === "moguraGame"){
        startMoguraGame();
    }
}
    
function startSystem() {

    setTimeout(() => {

        showScreen("logo");

        const sound = document.getElementById("bootSound");
        sound.currentTime = 0;
        sound.play().catch(()=>{});

        const logo = document.getElementById("logo");

        setTimeout(() => logo.style.opacity = 1, 100);
        setTimeout(() => logo.style.opacity = 0, 2000);
        setTimeout(() => showScreen("home"), 3000);

    }, 300);
}

    let moguraScore = 0;
let moguraTime = 20;
let moguraTimer;
let moguraSpawn;

// ゲーム開始
function startMoguraGame(){
    moguraScore = 0;
    moguraTime = 20;

    document.getElementById("moguraScore").innerText = 0;
    document.getElementById("moguraTime").innerText = 20;

    moguraTimer = setInterval(()=>{
        moguraTime--;
        document.getElementById("moguraTime").innerText = moguraTime;

        if(moguraTime <= 0){
            endMoguraGame();
        }
    },1000);

    moguraSpawn = setInterval(spawnMogura, 500);
}

function spawnMogura(){
    for(let i=0;i<2;i++){
        const img = document.createElement("img");
        img.src = "MoguraSITM.png";
        img.style.position = "absolute";
        img.style.width = "60px";

      

        img.onclick = ()=>{
            moguraScore++;
            document.getElementById("moguraScore").innerText = moguraScore;
            img.remove();
        };

        document.getElementById("moguraGame").appendChild(img);

        setTimeout(()=> img.remove(), 500);
    }
}

function endMoguraGame(){
    clearInterval(moguraTimer);
    clearInterval(moguraSpawn);

    document.getElementById("moguraResultText").innerText =
        "スコア: " + moguraScore;

    showScreen("moguraResult");

    document.querySelectorAll("#moguraGame img").forEach(e=>e.remove());
}

function restartMogura(){
    showScreen("moguraGame");
    startMoguraGame();
}
    
</script>

<script src="janken.js"></script>
    <script src="catch.js"></script>
<audio id="bootSound" src="Sound.mp3"></audio>
 
</body>
</html>
